name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '14'
      - run: corepack enable
      - run: yarn --version
      - run: yarn install
      - run: yarn typecheck
      - run: yarn test
